<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">shantytown</title>
  <desc id="desc">A cluster of corrugated shacks. Their windows are split like tmux panes, a line of coloured beads is strung between them, chimney smoke curls into a python, and an anchor rests at the front.</desc>
  <defs>
    <linearGradient id="wallA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C2703F"/><stop offset="100%" stop-color="#8C4A2F"/>
    </linearGradient>
    <linearGradient id="wallB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A65E3C"/><stop offset="100%" stop-color="#733A26"/>
    </linearGradient>
    <linearGradient id="wallC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B26A45"/><stop offset="100%" stop-color="#7E4229"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5E6B7A"/><stop offset="100%" stop-color="#414B58"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD98A"/><stop offset="100%" stop-color="#F2B441"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#242742"/><stop offset="100%" stop-color="#191b2f"/>
    </linearGradient>
    <filter id="sh" x="-12%" y="-12%" width="126%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000055"/>
    </filter>
    <clipPath id="disc"><circle cx="256" cy="256" r="240"/></clipPath>
  </defs>

  <!-- the disc, matching quipu and bobbin so the three read as one family -->
  <circle cx="256" cy="256" r="240" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="#2d2d4a" stroke-width="1.5"/>

  <g clip-path="url(#disc)">
    <!-- the ground everyone shares -->
    <path d="M16 402 Q 150 386 256 396 Q 370 406 496 390 L496 496 L16 496 Z" fill="url(#ground)"/>
    <path d="M16 402 Q 150 386 256 396 Q 370 406 496 390" fill="none" stroke="#343a5c" stroke-width="2"/>

    <!-- PYTHON — the chimney smoke curls into a snake -->
    <path d="M214 214 C 214 188 240 186 240 166 C 240 148 218 146 216 130 C 214 116 228 108 244 110"
          fill="none" stroke="#6FB3A0" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
    <circle cx="247" cy="110" r="4.5" fill="#6FB3A0"/>
    <circle cx="248.6" cy="108.6" r="1.3" fill="#1a1a2e"/>

    <!-- ===== the shacks. every window is split like a tmux layout ===== -->

    <g filter="url(#sh)">
      <path d="M96 306 L162 300 L164 396 L98 396 Z" fill="url(#wallB)"/>
      <path d="M88 308 L166 300 L162 286 L92 294 Z" fill="url(#roof)"/>
      <g stroke="#39424E" stroke-width="1.6" opacity="0.85">
        <path d="M100 305 L104 292"/><path d="M116 303 L120 290"/><path d="M132 301 L136 289"/><path d="M148 300 L152 287"/>
      </g>
      <rect x="108" y="322" width="40" height="30" rx="2" fill="url(#glow)"/>
      <g stroke="#2A2F3A" stroke-width="2.4"><path d="M130 322 L130 352"/><path d="M130 337 L148 337"/></g>
      <rect x="108" y="366" width="18" height="30" fill="#4A2A1C"/>
    </g>

    <g filter="url(#sh)">
      <rect x="206" y="196" width="14" height="26" fill="#4C5561"/>
      <path d="M176 246 L256 240 L258 396 L178 396 Z" fill="url(#wallA)"/>
      <path d="M168 250 L262 240 L258 224 L172 234 Z" fill="url(#roof)"/>
      <g stroke="#39424E" stroke-width="1.6" opacity="0.85">
        <path d="M182 247 L186 233"/><path d="M200 245 L204 231"/><path d="M218 243 L222 229"/><path d="M236 241 L240 227"/><path d="M252 240 L256 226"/>
      </g>
      <rect x="190" y="266" width="52" height="38" rx="2" fill="url(#glow)"/>
      <g stroke="#2A2F3A" stroke-width="2.6"><path d="M218 266 L218 304"/><path d="M218 285 L242 285"/></g>
      <rect x="192" y="320" width="46" height="30" rx="2" fill="#F2B441" opacity="0.5"/>
      <path d="M215 320 L215 350" stroke="#2A2F3A" stroke-width="2.2" opacity="0.8"/>
      <rect x="222" y="364" width="20" height="32" fill="#4A2A1C"/>
    </g>

    <g filter="url(#sh)">
      <path d="M272 284 L344 278 L346 396 L274 396 Z" fill="url(#wallC)"/>
      <path d="M264 288 L350 278 L346 264 L268 274 Z" fill="url(#roof)"/>
      <g stroke="#39424E" stroke-width="1.6" opacity="0.85">
        <path d="M278 285 L282 272"/><path d="M296 283 L300 270"/><path d="M314 281 L318 268"/><path d="M332 279 L336 266"/>
      </g>
      <rect x="286" y="302" width="46" height="34" rx="2" fill="url(#glow)"/>
      <g stroke="#2A2F3A" stroke-width="2.5"><path d="M311 302 L311 336"/><path d="M311 319 L332 319"/></g>
      <rect x="292" y="364" width="19" height="32" fill="#4A2A1C"/>
    </g>

    <g filter="url(#sh)">
      <path d="M356 300 L420 306 L418 396 L354 396 Z" fill="url(#wallB)"/>
      <path d="M350 304 L426 310 L428 296 L354 290 Z" fill="url(#roof)"/>
      <g stroke="#39424E" stroke-width="1.6" opacity="0.85">
        <path d="M362 302 L364 289"/><path d="M378 303 L380 291"/><path d="M394 305 L396 293"/><path d="M410 307 L412 294"/>
      </g>
      <rect x="366" y="322" width="42" height="30" rx="2" fill="url(#glow)"/>
      <g stroke="#2A2F3A" stroke-width="2.4"><path d="M387 322 L387 352"/><path d="M387 337 L408 337"/></g>
    </g>

    <!-- ===== BEADS — the tracker, strung between the shacks ===== -->
    <path d="M104 318 Q 256 366 420 312" fill="none" stroke="#8A93B5" stroke-width="2.5" stroke-linecap="round"/>
    <g stroke="#5C6488" stroke-width="1.6">
      <path d="M148 337 L148 347"/><path d="M196 352 L196 362"/><path d="M256 358 L256 368"/>
      <path d="M316 352 L316 362"/><path d="M370 335 L370 345"/>
    </g>
    <circle cx="148" cy="352" r="7.5" fill="#E07A5F" stroke="#C45B3C" stroke-width="1.5"/>
    <circle cx="196" cy="367" r="7.5" fill="#3D85C6" stroke="#2A6BAD" stroke-width="1.5"/>
    <circle cx="256" cy="373" r="7.5" fill="#81B29A" stroke="#5E9B7E" stroke-width="1.5"/>
    <circle cx="316" cy="367" r="7.5" fill="#F2CC8F" stroke="#D4A95A" stroke-width="1.5"/>
    <circle cx="370" cy="350" r="7.5" fill="#9B72AA" stroke="#7D5691" stroke-width="1.5"/>

    <!-- ANCHOR — what holds an agent to its work — leaning on the ground -->
    <g transform="translate(44,318) scale(1.18)" stroke="#AEB8C8" fill="none" stroke-linecap="round">
      <circle cx="16" cy="6" r="6.5" stroke-width="4"/>
      <path d="M16 13 L16 58" stroke-width="5"/>
      <path d="M3 22 L29 22" stroke-width="5"/>
      <path d="M2 42 C 3 58 29 58 30 42" stroke-width="5"/>
    </g>
  </g>
</svg>
