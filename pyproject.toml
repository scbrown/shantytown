[project]
name = "shantytown"
version = "0.0.1"
description = "A small harness for running a crew of coding agents."
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Steve Brown", email = "scbrown3@gmail.com" }]
dependencies = []

[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["shantytown"]

[project.scripts]
st = "shantytown.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
